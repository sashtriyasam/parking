services:
  # 1. Backend Web Service (Node.js + Prisma + Sockets)
  - type: web
    name: parkeasy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: "npm install && npx prisma generate"
    startCommand: "node index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Transaction Pooler URL (6543)
      - key: DIRECT_URL
        sync: false # Direct Connection URL (5432) for migrations
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # 2. Frontend Static Site (Vite/React)
  - type: static
    name: parkeasy-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    publishDir: dist
    routes:
      # Support SPA Client-Side Routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Link to your backend URL (.onrender.com)
